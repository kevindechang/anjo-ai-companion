<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Anjo — Debug</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #1a1918;
      --surface2: #232221;
      --border: #363432;
      --accent: #c9a96e;
      --accent2: #d4b896;
      --text: #e6e2dc;
      --text-muted: #887f76;
      --green: #34d399;
      --red: #e07a5f;
      --yellow: #fbbf24;
      --radius: 14px;
      --font: 'DM Sans', system-ui, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.3px;
    }

    .header-tag {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 2px 8px;
      border-radius: 20px;
    }

    .main {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 0;
      flex: 1;
      overflow: hidden;
    }

    /* ── Mobile: stack panels with tab switcher ── */
    @media (max-width: 900px) {
      .main {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .panel {
        display: none;
        flex: 1;
        border-right: none;
        border-bottom: none;
        min-height: 0;
      }
      .panel.panel-active {
        display: flex;
      }
      .mobile-tabs {
        display: flex;
        flex-shrink: 0;
        border-bottom: 1px solid var(--border);
        background: var(--bg);
      }
      .mobile-tab {
        flex: 1;
        padding: 12px 6px;
        background: none;
        border: none;
        border-bottom: 2px solid transparent;
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 600;
        font-family: var(--font);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
        transition: color 0.15s, border-color 0.15s;
      }
      .mobile-tab.active {
        color: var(--accent2);
        border-bottom-color: var(--accent2);
      }
      header {
        padding: 10px 16px;
        gap: 8px;
      }
      header h1 { font-size: 16px; }
      main { padding: 16px; }
      .panel-body { padding: 12px; }
    }
    @media (min-width: 901px) {
      .mobile-tabs { display: none; }
      .panel { display: flex !important; }
    }

    .panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
    }

    .panel:last-child { border-right: none; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
    }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
    }

    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-track { background: transparent; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Self-Core ── */
    .sc-section { margin-bottom: 20px; }
    .sc-section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--accent2);
      margin-bottom: 10px;
    }

    .trait-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .trait-label {
      width: 90px;
      font-size: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .trait-bar-bg {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
    }

    .trait-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .trait-val {
      font-size: 11px;
      color: var(--text-muted);
      width: 30px;
      text-align: right;
      flex-shrink: 0;
    }

    .kv-row {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
      align-items: flex-start;
    }

    .kv-key {
      font-size: 11px;
      color: var(--text-muted);
      min-width: 90px;
      flex-shrink: 0;
    }

    .kv-val {
      font-size: 12px;
      color: var(--text);
      word-break: break-word;
    }

    .stage-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--accent);
      color: #0f0d0c;
    }

    .note-item {
      font-size: 12px;
      color: var(--text);
      padding: 6px 8px;
      background: var(--surface2);
      border-radius: 6px;
      margin-bottom: 5px;
      border-left: 2px solid var(--accent2);
    }

    .empty-state {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Chat ── */
    #chat-panel {
      display: flex;
      flex-direction: column;
    }

    .chat-thread {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .chat-thread::-webkit-scrollbar { width: 4px; }
    .chat-thread::-webkit-scrollbar-track { background: transparent; }
    .chat-thread::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 85%;
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.anjo { align-self: flex-start; align-items: flex-start; }

    .msg-sender {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 4px;
      color: var(--text-muted);
    }

    .msg.user .msg-sender { color: var(--accent2); }
    .msg.anjo .msg-sender { color: var(--green); }

    .msg-bubble {
      padding: 10px 13px;
      border-radius: var(--radius);
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .msg-bubble {
      background: var(--accent);
      color: #0f0d0c;
      border-bottom-right-radius: 3px;
    }

    .msg.anjo .msg-bubble {
      background: var(--surface2);
      color: var(--text);
      border-bottom-left-radius: 3px;
    }

    .msg-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .typing-indicator span {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--text-muted);
      border-radius: 50%;
      margin: 0 1px;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-4px); opacity: 1; }
    }

    .chat-input-area {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    #chat-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      padding: 9px 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      min-height: 38px;
      transition: border-color 0.15s;
    }

    #chat-input:focus { border-color: var(--accent); }
    #chat-input::placeholder { color: var(--text-muted); }

    .btn {
      background: var(--accent);
      color: #0f0d0c;
      border: none;
      border-radius: 20px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn:hover { opacity: 0.88; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: var(--surface);
      color: var(--text-muted);
      border: 1px solid var(--border);
      font-size: 12px;
      padding: 6px 14px;
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--text-muted); opacity: 1; }

    .btn-danger {
      background: transparent;
      color: var(--red);
      border: 1px solid var(--red);
      font-size: 11px;
      padding: 4px 10px;
    }

    .btn-danger:hover { background: var(--red); color: #fff; opacity: 1; }

    /* ── Right panel tabs ── */
    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab-btn {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .tab-btn.active {
      color: var(--accent2);
      border-bottom-color: var(--accent2);
    }

    .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
    .tab-content.active { display: flex; }

    /* ── System Prompt ── */
    #prompt-text {
      font-family: 'Menlo', 'Fira Code', monospace;
      font-size: 11px;
      line-height: 1.6;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Memory ── */
    .memory-section-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--accent2);
      margin: 12px 0 6px;
    }

    .memory-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 9px 11px;
      margin-bottom: 7px;
    }

    .memory-doc {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 5px;
    }

    .memory-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .meta-chip {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1px 7px;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .status-dot.offline { background: var(--red); }
    .status-dot.loading { background: var(--yellow); animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    /* ── PAD Mood (bipolar -1..1) ── */
    .pad-bar-bg {
      flex: 1;
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .pad-bar-center {
      position: absolute;
      left: 50%;
      top: 0;
      width: 1px;
      height: 100%;
      background: var(--border);
      z-index: 1;
    }
    .pad-bar-fill {
      position: absolute;
      height: 100%;
      border-radius: 3px;
    }

    /* ── Tone badge ── */
    .tone-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--accent2);
      color: var(--accent2);
    }

    /* ── Emotional Residue ── */
    .residue-item {
      background: var(--surface2);
      border-radius: 6px;
      padding: 7px 9px;
      margin-bottom: 5px;
      border-left: 2px solid #fb923c;
    }
    .residue-header {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 4px;
    }
    .residue-emotion {
      font-size: 12px;
      font-weight: 600;
      color: #fb923c;
      min-width: 80px;
      flex-shrink: 0;
      text-transform: capitalize;
    }
    .residue-source {
      font-size: 11px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ── Desires ── */
    .desire-item {
      font-size: 12px;
      color: var(--text);
      padding: 5px 8px;
      margin-bottom: 4px;
      background: var(--surface2);
      border-radius: 6px;
      border-left: 2px solid var(--accent);
    }
  </style>
</head>
<body>
  <header>
    <div class="status-dot" id="status-dot"></div>
    <h1>Anjo</h1>
    <span class="header-tag">Dashboard</span>
    <div style="flex:1"></div>
    <button class="btn btn-ghost" onclick="refreshAll()">Refresh All</button>
    <button class="btn btn-danger" onclick="factoryReset()">Reset</button>
    <a href="/chat" class="btn btn-ghost" style="text-decoration:none;">← Chat</a>
    <a href="/logout" class="btn btn-ghost" style="text-decoration:none;">Logout</a>
  </header>

  <div class="mobile-tabs" id="mobile-tabs">
    <button class="mobile-tab active" onclick="switchMobilePanel('self-core-panel', this)">Self-Core</button>
    <button class="mobile-tab" onclick="switchMobilePanel('chat-panel', this)">Chat</button>
    <button class="mobile-tab" onclick="switchMobilePanel('right-panel', this)">Debug</button>
  </div>

  <div class="main">
    <!-- LEFT: Self-Core -->
    <div class="panel panel-active" id="self-core-panel">
      <div class="panel-header">
        <span class="panel-title">Self-Core</span>
        <button class="btn btn-ghost" onclick="loadSelfCore()">Refresh</button>
      </div>
      <div class="panel-body" id="self-core-body">
        <div class="empty-state">Loading...</div>
      </div>
    </div>

    <!-- CENTER: Chat -->
    <div class="panel" id="chat-panel">
      <div class="panel-header">
        <span class="panel-title">Chat</span>
        <span id="cost-label" style="font-size:11px; color:var(--text-muted); margin-right:auto; margin-left:10px;"></span>
        <button class="btn btn-danger" onclick="endAndReflect()">End &amp; Reflect</button>
      </div>
      <div class="chat-thread" id="chat-thread"></div>
      <div class="chat-input-area">
        <div class="chat-input-row">
          <textarea id="chat-input" placeholder="Type a message..." rows="1"></textarea>
          <button class="btn" id="send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>

    <!-- RIGHT: System Prompt + Memory -->
    <div class="panel" id="right-panel" style="border-right:none;">
      <div class="tab-bar" style="background:var(--surface);">
        <button class="tab-btn active" onclick="switchTab('prompt', this)">System Prompt</button>
        <button class="tab-btn" onclick="switchTab('memory', this)">Memory</button>
        <button class="tab-btn" onclick="switchTab('log', this); loadReflectionLog()">Log</button>
      </div>

      <!-- System Prompt tab -->
      <div class="tab-content active" id="tab-prompt" style="flex-direction:column; overflow:hidden;">
        <div style="display:flex; align-items:center; justify-content:flex-end; padding:8px 12px; border-bottom:1px solid var(--border); flex-shrink:0; background:var(--surface);">
          <button class="btn btn-ghost" onclick="loadSystemPrompt()">Refresh</button>
        </div>
        <div class="panel-body">
          <pre id="prompt-text" class="empty-state">Loading...</pre>
        </div>
      </div>

      <!-- Memory tab -->
      <div class="tab-content" id="tab-memory" style="flex-direction:column; overflow:hidden;">
        <div style="display:flex; align-items:center; justify-content:flex-end; padding:8px 12px; border-bottom:1px solid var(--border); flex-shrink:0; background:var(--surface);">
          <button class="btn btn-ghost" onclick="loadMemories()">Refresh</button>
        </div>
        <div class="panel-body" id="memory-body">
          <div class="empty-state">Loading...</div>
        </div>
      </div>

      <!-- Log tab -->
      <div class="tab-content" id="tab-log" style="flex-direction:column; overflow:hidden;">
        <div style="display:flex; align-items:center; justify-content:flex-end; padding:8px 12px; border-bottom:1px solid var(--border); flex-shrink:0; background:var(--surface);">
          <button class="btn btn-ghost" onclick="loadReflectionLog()">Refresh</button>
        </div>
        <div class="panel-body" id="log-body">
          <div class="empty-state">No reflections yet.</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const sessionId = 'main';
    let isStreaming = false;

    // ── End session on tab close ─────────────────────────────────────────
    async function _endSessionQuietly() {
      if (isStreaming) return;
      try {
        await fetch(`/api/chat/${sessionId}/end`, {
          method: 'POST',
          keepalive: true,
          credentials: 'same-origin'
        });
      } catch (_) { }
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') _endSessionQuietly();
    });
    window.addEventListener('pagehide', _endSessionQuietly);

    // ── Relative time ─────────────────────────────────────────
    function relativeTime(iso) {
      const diff = (Date.now() - new Date(iso)) / 1000;
      if (diff < 60)          return 'just now';
      if (diff < 3600)        return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400)       return `${Math.floor(diff / 3600)}h ago`;
      if (diff < 86400 * 2)   return 'yesterday';
      if (diff < 86400 * 7)   return `${Math.floor(diff / 86400)}d ago`;
      if (diff < 86400 * 30)  return `${Math.floor(diff / 604800)}w ago`;
      return `${Math.floor(diff / 2592000)}mo ago`;
    }

    // ── Tabs ──────────────────────────────────────────────────
    function switchTab(name, btn) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + name).classList.add('active');
    }

    // ── Mobile panel switcher ─────────────────────────────────
    function switchMobilePanel(panelId, btn) {
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('panel-active'));
      document.querySelectorAll('.mobile-tab').forEach(b => b.classList.remove('active'));
      document.getElementById(panelId).classList.add('panel-active');
      btn.classList.add('active');
    }

    // ── Helpers ───────────────────────────────────────────────
    function setStatus(state) {
      const dot = document.getElementById('status-dot');
      dot.className = 'status-dot' + (state === 'loading' ? ' loading' : state === 'offline' ? ' offline' : '');
    }

    async function loadEmotions() {
      try {
        const r = await fetch('/api/session/emotions');
        const d = await r.json();
        renderEmotions(d.active_emotions || {});
      } catch(_) {}
    }

    function refreshAll() {
      loadSelfCore();
      loadEmotions();
      loadSystemPrompt();
      loadMemories();
      if (!isStreaming) loadHistory();
    }

    async function loadUsage() {
      try {
        const r = await fetch('/api/session/usage');
        const d = await r.json();
        const el = document.getElementById('cost-label');
        if (d.input_tokens > 0) {
          el.textContent = `~$${d.cost_usd.toFixed(4)} · ${(d.input_tokens + d.output_tokens).toLocaleString()} tokens`;
        }
      } catch (_) {}
    }

    async function endAndReflect() {
      if (isStreaming) return;
      appendSystemMsg('Reflecting — this may take a moment...');
      setStatus('loading');
      try {
        const r = await fetch(`/api/chat/${sessionId}/end`, {method: 'POST'});
        const data = await r.json();
        if (data.ok) {
          appendSystemMsg('Reflection complete. Personality updated.');
          setStatus('online');
          loadSelfCore();
          loadMemories();
          loadReflectionLog();
        } else {
          appendSystemMsg('Reflection failed: ' + (data.error || 'unknown error'), true);
          setStatus('offline');
        }
      } catch (e) {
        appendSystemMsg('Reflection failed: ' + e.message, true);
        setStatus('offline');
      }
    }

    async function factoryReset() {
      if (!confirm('Reset everything to defaults? This will erase all memories, personality changes, and chat history. This cannot be undone.')) return;
      setStatus('loading');
      try {
        await fetch('/api/reset', {method: 'POST'});
        document.getElementById('chat-thread').innerHTML = '';
        refreshAll();
      } catch (e) {
        appendSystemMsg('Reset failed: ' + e.message, true);
        setStatus('offline');
      }
    }

    // ── Self-Core ─────────────────────────────────────────────
    async function loadSelfCore() {
      try {
        const r = await fetch('/api/self-core');
        const data = await r.json();
        renderSelfCore(data);
      } catch (e) {
        document.getElementById('self-core-body').innerHTML = `<div class="empty-state" style="color:var(--red)">Error: ${e.message}</div>`;
      }
    }

    function renderEmotions(emotions) {
      const el = document.getElementById('emotion-state');
      if (!el) return;
      const emotionColors = {
        joy: '#4ade80', admiration: '#c9a96e', interest: '#5AC8BE',
        distress: '#e07a5f', reproach: '#fb923c', discomfort: '#d4b896',
      };
      const active = Object.entries(emotions || {}).filter(([,v]) => v > 0.3);
      if (!active.length) {
        el.innerHTML = '<div class="empty-state">Neutral</div>';
        return;
      }
      el.innerHTML = active.sort((a,b) => b[1]-a[1]).map(([k,v]) => {
        const color = emotionColors[k] || 'var(--accent)';
        const pct = (v * 100).toFixed(0);
        return `<div class="trait-row">
          <span class="trait-label" style="color:${color}">${k.charAt(0).toUpperCase()+k.slice(1)}</span>
          <div class="trait-bar-bg"><div class="trait-bar-fill" style="width:${pct}%;background:${color}"></div></div>
          <span class="trait-val">${v.toFixed(2)}</span>
        </div>`;
      }).join('');
    }

    function renderSelfCore(data) {
      const body = document.getElementById('self-core-body');
      const p = data.personality;
      const rel = data.relationship;
      const mood = data.mood || {};
      const att = data.attachment || {};
      const residue = data.emotional_residue || [];
      const desires = data.relational_desires || [];

      const traitKeys = ['O','C','E','A','N'];
      const traitLabels = { O:'Openness', C:'Conscientiousness', E:'Extraversion', A:'Agreeableness', N:'Neuroticism' };

      // ── Personality ──────────────────────────────────────────
      let html = `<div class="sc-section"><div class="sc-section-title">Personality</div>`;
      for (const key of traitKeys) {
        const val = p[key] ?? 0;
        html += `<div class="trait-row">
          <span class="trait-label">${traitLabels[key]}</span>
          <div class="trait-bar-bg"><div class="trait-bar-fill" style="width:${(val*100).toFixed(0)}%"></div></div>
          <span class="trait-val">${val.toFixed(2)}</span>
        </div>`;
      }
      html += `</div>`;

      // ── PAD Mood ─────────────────────────────────────────────
      const padKeys = ['valence','arousal','dominance'];
      const padColors = { valence:'#4ade80', arousal:'#fbbf24', dominance:'#818cf8' };
      html += `<div class="sc-section"><div class="sc-section-title">Mood (PAD)</div>`;
      for (const key of padKeys) {
        const val = mood[key] ?? 0;
        const color = padColors[key];
        const absW = (Math.abs(val) * 50).toFixed(1);
        const leftPct = val >= 0 ? 50 : ((val + 1) / 2 * 100).toFixed(1);
        html += `<div class="trait-row">
          <span class="trait-label" style="text-transform:capitalize">${key}</span>
          <div class="pad-bar-bg">
            <div class="pad-bar-center"></div>
            <div class="pad-bar-fill" style="left:${leftPct}%;width:${absW}%;background:${color}"></div>
          </div>
          <span class="trait-val" style="color:${color}">${val >= 0 ? '+' : ''}${val.toFixed(2)}</span>
        </div>`;
      }
      html += `</div>`;

      // ── Relationship ─────────────────────────────────────────
      html += `<div class="sc-section"><div class="sc-section-title">Relationship</div>
        <div class="kv-row"><span class="kv-key">Stage</span><span class="kv-val"><span class="stage-badge">${rel.stage}</span></span></div>
        <div class="kv-row"><span class="kv-key">Sessions</span><span class="kv-val">${rel.session_count}</span></div>`;
      if (rel.user_name) html += `<div class="kv-row"><span class="kv-key">Name</span><span class="kv-val">${escHtml(rel.user_name)}</span></div>`;
      if (rel.trust_score != null) html += `<div class="trait-row" style="margin-top:2px;">
        <span class="trait-label">Trust</span>
        <div class="trait-bar-bg"><div class="trait-bar-fill" style="width:${(rel.trust_score*100).toFixed(0)}%;background:var(--green)"></div></div>
        <span class="trait-val">${(rel.trust_score*100).toFixed(0)}%</span>
      </div>`;
      // Stage progress toward next level
      const _STAGE_ORDER = ['stranger','acquaintance','friend','close','intimate'];
      const _STAGE_FLOORS = {stranger:0, acquaintance:2.0, friend:5.5, close:13.0, intimate:30.0};
      const _stageIdx = _STAGE_ORDER.indexOf(rel.stage);
      const _nextStage = _STAGE_ORDER[_stageIdx + 1];
      if (_nextStage && rel.cumulative_significance != null) {
        const floor = _STAGE_FLOORS[rel.stage] || 0;
        const ceil = _STAGE_FLOORS[_nextStage];
        const pct = Math.min(100, ((rel.cumulative_significance - floor) / (ceil - floor)) * 100).toFixed(0);
        html += `<div class="trait-row" style="margin-top:2px;">
          <span class="trait-label" style="font-size:10px;">→ ${_nextStage}</span>
          <div class="trait-bar-bg"><div class="trait-bar-fill" style="width:${pct}%;background:var(--accent2)"></div></div>
          <span class="trait-val">${pct}%</span>
        </div>`;
      } else if (rel.cumulative_significance != null) {
        html += `<div class="kv-row"><span class="kv-key">Sig total</span><span class="kv-val">${rel.cumulative_significance.toFixed(2)}</span></div>`;
      }
      if (rel.consecutive_hostile > 0) html += `<div class="kv-row"><span class="kv-key">Hostile streak</span><span class="kv-val" style="color:var(--red)">${rel.consecutive_hostile.toFixed(1)} / 3</span></div>`;
      if (rel.last_session) html += `<div class="kv-row"><span class="kv-key">Last seen</span><span class="kv-val">${relativeTime(rel.last_session)}</span></div>`;
      if (rel.last_session_tone) html += `<div class="kv-row"><span class="kv-key">Last tone</span><span class="kv-val"><span class="tone-badge">${escHtml(rel.last_session_tone)}</span></span></div>`;
      if (rel.opinion_of_user) html += `<div class="kv-row"><span class="kv-key">Opinion</span><span class="kv-val">${escHtml(rel.opinion_of_user)}</span></div>`;
      html += `</div>`;

      // ── Attachment ───────────────────────────────────────────
      html += `<div class="sc-section"><div class="sc-section-title">Attachment</div>`;
      if (att.weight > 0) {
        html += `<div class="trait-row">
          <span class="trait-label">Weight</span>
          <div class="trait-bar-bg"><div class="trait-bar-fill" style="width:${(att.weight*100).toFixed(0)}%;background:#f472b6"></div></div>
          <span class="trait-val">${att.weight.toFixed(2)}</span>
        </div>`;
        if (att.texture) html += `<div class="kv-row"><span class="kv-key">Texture</span><span class="kv-val" style="font-style:italic;color:var(--accent2)">${escHtml(att.texture)}</span></div>`;
        if (att.longing > 0.05) html += `<div class="trait-row">
          <span class="trait-label">Longing</span>
          <div class="trait-bar-bg"><div class="trait-bar-fill" style="width:${(att.longing*100).toFixed(0)}%;background:#C060C0"></div></div>
          <span class="trait-val">${att.longing.toFixed(2)}</span>
        </div>`;
        if (att.comfort > 0.05) html += `<div class="trait-row">
          <span class="trait-label">Comfort</span>
          <div class="trait-bar-bg"><div class="trait-bar-fill" style="width:${(att.comfort*100).toFixed(0)}%;background:var(--green)"></div></div>
          <span class="trait-val">${att.comfort.toFixed(2)}</span>
        </div>`;
      } else {
        html += `<div class="empty-state">Not yet formed</div>`;
      }
      html += `</div>`;

      // ── Emotional Residue ────────────────────────────────────
      html += `<div class="sc-section"><div class="sc-section-title">Emotional Residue</div>`;
      if (residue.length) {
        for (const r of [...residue].sort((a,b) => b.intensity - a.intensity)) {
          html += `<div class="residue-item">
            <div class="residue-header">
              <span class="residue-emotion">${escHtml(r.emotion)}</span>
              <div class="trait-bar-bg" style="flex:1;margin:0 8px;">
                <div class="trait-bar-fill" style="width:${(r.intensity*100).toFixed(0)}%;background:#fb923c"></div>
              </div>
              <span class="trait-val">${r.intensity.toFixed(2)}</span>
            </div>
            <div class="residue-source">${escHtml(r.source)}</div>
          </div>`;
        }
      } else {
        html += `<div class="empty-state">Nothing carrying forward</div>`;
      }
      html += `</div>`;

      // ── Desires ──────────────────────────────────────────────
      html += `<div class="sc-section"><div class="sc-section-title">Desires</div>`;
      const survived = data.desire_survived || {};
      if (desires.length) {
        for (const d of desires) {
          const count = survived[d.toLowerCase()] || 1;
          const age = count === 1 ? 'new' : `${count} sessions`;
          html += `<div class="desire-item">${escHtml(d)}<span style="font-size:10px;color:var(--text-muted);margin-left:6px;">${age}</span></div>`;
        }
      } else {
        html += `<div class="empty-state">No desires yet</div>`;
      }
      html += `</div>`;

      // ── Goals & Standards ────────────────────────────────────
      const goals = data.goals || {};
      html += `<div class="sc-section"><div class="sc-section-title">Goals &amp; Standards</div>`;
      for (const [key, color] of [['rapport','#4ade80'],['intellectual','#5AC8BE'],['autonomy','#C060C0'],['respect','#fbbf24'],['honesty','#d4b896']]) {
        const val = goals[key] ?? 0;
        html += `<div class="trait-row">
          <span class="trait-label" style="text-transform:capitalize">${key}</span>
          <div class="trait-bar-bg"><div class="trait-bar-fill" style="width:${(val*100).toFixed(0)}%;background:${color}"></div></div>
          <span class="trait-val">${val.toFixed(2)}</span>
        </div>`;
      }
      html += `</div>`;

      // ── Active Emotions ───────────────────────────────────────
      html += `<div class="sc-section">
        <div class="sc-section-title">Active Emotions</div>
        <div id="emotion-state"><div class="empty-state">Send a message to appraise</div></div>
      </div>`;

      // ── Self-Observations ────────────────────────────────────
      html += `<div class="sc-section"><div class="sc-section-title">Self-Observations</div>`;
      if (data.notes && data.notes.length) {
        for (const n of data.notes) html += `<div class="note-item">${escHtml(n)}</div>`;
      } else {
        html += `<div class="empty-state">No notes yet</div>`;
      }
      html += `</div>`;

      const ts = new Date(data.last_updated).toLocaleString();
      html += `<div style="font-size:10px;color:var(--text-muted);margin-top:4px;">v${data.version} · ${ts}</div>`;

      body.innerHTML = html;
    }

    // ── System Prompt ─────────────────────────────────────────
    async function loadSystemPrompt() {
      const el = document.getElementById('prompt-text');
      el.className = 'empty-state';
      el.textContent = 'Loading...';
      try {
        const r = await fetch('/api/system-prompt');
        const data = await r.json();
        el.className = '';
        el.textContent = data.prompt;
      } catch (e) {
        el.style.color = 'var(--red)';
        el.textContent = 'Error: ' + e.message;
      }
    }

    // ── Memory ────────────────────────────────────────────────
    async function loadMemories() {
      const body = document.getElementById('memory-body');
      body.innerHTML = '<div class="empty-state">Loading...</div>';
      try {
        const r = await fetch('/api/memories');
        const data = await r.json();
        renderMemories(data);
      } catch (e) {
        body.innerHTML = `<div class="empty-state" style="color:var(--red)">Error: ${e.message}</div>`;
      }
    }

    function renderMemories(data) {
      const body = document.getElementById('memory-body');
      const total = data.semantic.length + data.emotional.length;
      if (total === 0) {
        body.innerHTML = '<div class="empty-state">No memories stored yet.</div>';
        return;
      }

      let html = '';
      for (const [label, list] of [['Semantic', data.semantic], ['Emotional', data.emotional]]) {
        html += `<div class="memory-section-title">${label} (${list.length})</div>`;
        if (!list.length) {
          html += '<div class="empty-state" style="margin-bottom:10px;">None</div>';
          continue;
        }
        for (const m of list) {
          const meta = m.metadata || {};
          const chips = [];
          if (meta.emotional_tone) chips.push(meta.emotional_tone);
          if (meta.emotional_valence != null) chips.push(`valence: ${Number(meta.emotional_valence).toFixed(2)}`);
          if (meta.significance != null) chips.push(`sig: ${Number(meta.significance).toFixed(2)}`);
          if (meta.relationship_stage) chips.push(meta.relationship_stage);
          if (meta.timestamp) chips.push(new Date(meta.timestamp).toLocaleDateString());

          html += `<div class="memory-card">
            <div class="memory-doc">${escHtml(m.document)}</div>
            <div class="memory-meta">${chips.map(c => `<span class="meta-chip">${escHtml(c)}</span>`).join('')}</div>
          </div>`;
        }
      }
      body.innerHTML = html;
    }

    // ── Reflection Log ────────────────────────────────────────
    async function loadReflectionLog() {
      const body = document.getElementById('log-body');
      body.innerHTML = '<div class="empty-state">Loading...</div>';
      try {
        const r = await fetch('/api/reflection-log');
        const data = await r.json();
        renderReflectionLog(data.entries);
      } catch (e) {
        body.innerHTML = `<div class="empty-state" style="color:var(--red)">Error: ${e.message}</div>`;
      }
    }

    function renderReflectionLog(entries) {
      const body = document.getElementById('log-body');
      if (!entries.length) {
        body.innerHTML = '<div class="empty-state">No reflections yet.</div>';
        return;
      }
      let html = '';
      for (const e of [...entries].reverse()) {
        const ts = new Date(e.timestamp).toLocaleString();
        const deltaKeys = Object.keys(e.deltas || {});
        const chips = [];
        if (e.emotional_tone) chips.push(e.emotional_tone);
        if (e.significance != null) chips.push(`sig: ${Number(e.significance).toFixed(2)}`);
        if (e.mid_session) chips.push('mid-session');
        if (e.message_count) chips.push(`${e.message_count} msgs`);

        const nonZeroDeltas = Object.entries(e.deltas || {}).filter(([,v]) => typeof v === 'number' && v !== 0);
        const deltaHtml = nonZeroDeltas.length
          ? nonZeroDeltas.map(([k, v]) => {
              const color = v > 0 ? 'var(--green)' : 'var(--red)';
              return `<span class="meta-chip" style="color:${color}">${k} ${v > 0 ? '+' : ''}${v.toFixed(4)}</span>`;
            }).join('')
          : '<span class="meta-chip">no change</span>';

        if (e.valence != null) chips.push(`valence ${Number(e.valence).toFixed(2)}`);
        if (e.triggers && e.triggers.length) chips.push(...e.triggers);

        html += `<div class="memory-card">
          <div style="font-size:10px; color:var(--text-muted); margin-bottom:5px;">${ts}</div>
          ${e.summary ? `<div class="memory-doc">${escHtml(e.summary)}</div>` : ''}
          <div class="memory-meta" style="margin-bottom:5px;">${deltaHtml}</div>
          <div class="memory-meta">${chips.map(c => `<span class="meta-chip">${escHtml(c)}</span>`).join('')}</div>
          ${e.note ? `<div style="font-size:11px; color:var(--accent2); margin-top:5px; font-style:italic;">"${escHtml(e.note)}"</div>` : ''}
        </div>`;
      }
      body.innerHTML = html;
    }

    // ── Chat ──────────────────────────────────────────────────
    async function loadHistory() {
      if (isStreaming) return;
      try {
        const r = await fetch('/api/chat/history');
        const data = await r.json();
        const thread = document.getElementById('chat-thread');
        thread.innerHTML = '';
        for (const msg of data.history) {
          if (msg.role === 'user') {
            appendUserMsg(msg.content);
          } else if (msg.role === 'assistant') {
            const el = appendAnjoBubble();
            const bubble = el.querySelector('.msg-bubble');
            bubble.querySelector('.typing-indicator')?.remove();
            bubble.textContent = msg.content;
          }
        }
        setStatus('online');
      } catch (e) {
        appendSystemMsg('Failed to load history: ' + e.message, true);
        setStatus('offline');
      }
    }

    async function sendMessage() {
      if (isStreaming) return;
      const input = document.getElementById('chat-input');
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      input.style.height = 'auto';
      appendUserMsg(text);

      isStreaming = true;
      document.getElementById('send-btn').disabled = true;
      input.disabled = true;

      const anjoMsgEl = appendAnjoBubble();

      try {
        const url = `/api/chat/${sessionId}/message?text=${encodeURIComponent(text)}`;
        const es = new EventSource(url);

        es.addEventListener('token', (e) => {
          const {text: chunk} = JSON.parse(e.data);
          appendToAnjoBubble(anjoMsgEl, chunk);
        });

        es.addEventListener('done', (e) => {
          es.close();
          const {did_retrieve, active_emotions, intent} = JSON.parse(e.data);
          const meta = anjoMsgEl.querySelector('.msg-meta');
          if (meta) {
            const parts = [];
            if (intent) parts.push(intent.toLowerCase());
            if (did_retrieve) parts.push('memory retrieved');
            if (parts.length) meta.textContent = parts.join(' · ');
          }
          if (active_emotions) renderEmotions(active_emotions);
          finishStreaming();
          loadUsage();
        });

        es.addEventListener('error', (e) => {
          es.close();
          if (e.data) {
            const {error} = JSON.parse(e.data);
            appendSystemMsg('Error: ' + error, true);
          }
          finishStreaming();
        });

        es.onerror = () => {
          es.close();
          finishStreaming();
        };
      } catch (e) {
        appendSystemMsg('Error: ' + e.message, true);
        finishStreaming();
      }
    }

    function finishStreaming() {
      isStreaming = false;
      document.getElementById('send-btn').disabled = false;
      const input = document.getElementById('chat-input');
      input.disabled = false;
      input.focus();
    }

    function appendUserMsg(text) {
      const thread = document.getElementById('chat-thread');
      thread.innerHTML += `<div class="msg user">
        <div class="msg-sender">You</div>
        <div class="msg-bubble">${escHtml(text)}</div>
      </div>`;
      scrollThread();
    }

    function appendAnjoBubble() {
      const thread = document.getElementById('chat-thread');
      const el = document.createElement('div');
      el.className = 'msg anjo';
      el.innerHTML = `<div class="msg-sender">Anjo</div>
        <div class="msg-bubble"><span class="typing-indicator"><span></span><span></span><span></span></span></div>
        <div class="msg-meta"></div>`;
      thread.appendChild(el);
      scrollThread();
      return el;
    }

    function appendToAnjoBubble(el, chunk) {
      const bubble = el.querySelector('.msg-bubble');
      // Remove typing indicator on first token
      const typing = bubble.querySelector('.typing-indicator');
      if (typing) typing.remove();
      bubble.textContent += chunk;
      scrollThread();
    }

    function appendSystemMsg(text, isError = false) {
      const thread = document.getElementById('chat-thread');
      thread.innerHTML += `<div style="text-align:center; font-size:11px; color:${isError ? 'var(--red)' : 'var(--text-muted)'}; padding:4px 0;">${escHtml(text)}</div>`;
      scrollThread();
    }

    function scrollThread() {
      const thread = document.getElementById('chat-thread');
      thread.scrollTop = thread.scrollHeight;
    }

    // ── Utils ─────────────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Auto-resize textarea
    document.addEventListener('DOMContentLoaded', () => {
      const input = document.getElementById('chat-input');
      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      loadHistory();
    });

    // Poll self-core every 10s
    setInterval(loadSelfCore, 10000);

    // Initial load
    refreshAll();
  </script>
</body>
</html>
