<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Anjo</title>
  <link rel="manifest" href="/static/manifest.json" />
  <meta name="theme-color" content="#0d0d0f" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Anjo" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300;1,9..40,400&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0d0f;
      --surface: #1a1918;
      --surface2: #232221;
      --border: #363432;
      --accent: #c9a96e;
      --accent2: #d4b896;
      --text: #e6e2dc;
      --text-muted: #887f76;
      --radius: 18px;
      --green: #34d399; --red: #e07a5f;
      --font: 'DM Sans', system-ui, sans-serif;
      --max-width: 680px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      position: relative;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #orb {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      flex-shrink: 0;
      display: block;
      cursor: default;
    }

    .header-name {
      font-size: 16px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6dbf8a;
      flex-shrink: 0;
    }

    .status-dot.loading {
      background: #c9a96e;
      animation: pulse 1s infinite;
    }

    .status-dot.offline {
      background: #c97070;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    /* ── Menu ── */
    .menu-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 18px;
      line-height: 1;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, background 0.15s;
      position: relative;
    }

    .menu-btn:hover {
      color: var(--text);
      background: var(--surface2);
    }

    .dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px;
      min-width: 170px;
      z-index: 100;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
    }

    .dropdown.open {
      display: block;
    }

    .dropdown-item {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.12s;
      text-decoration: none;
    }

    .dropdown-item:hover {
      background: var(--surface2);
    }

    .dropdown-item.danger {
      color: #c97070;
    }

    /* ── Chat thread ── */
    .thread {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .thread::-webkit-scrollbar {
      width: 4px;
    }

    .thread::-webkit-scrollbar-track {
      background: transparent;
    }

    .thread::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: var(--max-width);
      width: 100%;
      margin: 0 auto;
    }

    .msg-row.user {
      flex-direction: row-reverse;
    }

    .msg-avatar-canvas {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-bottom: 2px;
      display: block;
    }

    .bubble {
      max-width: 72%;
      padding: 11px 15px;
      border-radius: var(--radius);
      line-height: 1.6;
      font-size: 15px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-row.anjo .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 5px;
      color: var(--text);
    }

    .msg-row.user .bubble {
      background: var(--accent);
      color: #0f0d0c;
      border-bottom-right-radius: 5px;
      font-weight: 500;
    }

    .msg-wrap {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-width: 72%;
    }

    .msg-row.user .msg-wrap {
      align-items: flex-end;
    }

    .msg-row.anjo .msg-wrap {
      align-items: flex-start;
    }

    .msg-wrap .bubble {
      max-width: 100%;
    }

    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.6;
      padding: 0 4px;
    }

    /* ── Typing indicator ── */
    .typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 13px 15px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {

      0%,
      60%,
      100% {
        transform: translateY(0);
      }

      30% {
        transform: translateY(-6px);
      }
    }

    /* ── Input area ── */
    .input-area {
      padding: 16px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: var(--max-width);
      margin: 0 auto;
    }

    textarea {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text);
      font-family: var(--font);
      font-size: 16px;
      padding: 10px 18px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 140px;
      overflow-y: auto;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--accent);
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: #0f0d0c;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
      box-shadow: 0 2px 12px rgba(201, 169, 110, 0.25);
    }

    .send-btn:hover {
      opacity: 0.88;
      box-shadow: 0 4px 16px rgba(201, 169, 110, 0.35);
    }

    .send-btn:active {
      transform: scale(0.94);
    }

    .send-btn:disabled {
      opacity: 0.35;
      cursor: default;
      box-shadow: none;
    }

    .send-btn svg {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: #0f0d0c;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>

<body>

  <!-- Password confirmation modal -->
  <div id="pwd-modal"
    style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
    <div
      style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px 28px;width:min(340px,90vw);">
      <p id="pwd-modal-title" style="font-size:16px;font-weight:500;margin-bottom:8px;"></p>
      <p id="pwd-modal-desc" style="font-size:13px;color:var(--text-muted);margin-bottom:20px;"></p>
      <input id="pwd-modal-input" type="password" placeholder="Your password"
        style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;padding:10px 13px;outline:none;margin-bottom:8px;" />
      <p id="pwd-modal-error" style="font-size:12px;color:#c97070;min-height:16px;margin-bottom:12px;"></p>
      <div style="display:flex;gap:8px;">
        <button onclick="closeModal()"
          style="flex:1;background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:10px;padding:10px;cursor:pointer;font-size:14px;">Cancel</button>
        <button id="pwd-modal-confirm"
          style="flex:1;background:#c97070;border:none;color:#fff;border-radius:10px;padding:10px;cursor:pointer;font-size:14px;font-weight:600;">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Account settings modal -->
  <div id="account-modal"
    style="display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,0.7);align-items:center;justify-content:center;">
    <div
      style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:0;width:min(400px,92vw);max-height:88vh;overflow-y:auto;display:flex;flex-direction:column;">
      <div
        style="display:flex;align-items:center;justify-content:space-between;padding:20px 24px 16px;border-bottom:1px solid var(--border);flex-shrink:0;">
        <span style="font-size:16px;font-weight:600;letter-spacing:-0.02em;">My account</span>
        <button onclick="closeAccountModal()"
          style="background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;">×</button>
      </div>
      <div style="padding:20px 24px;display:flex;flex-direction:column;gap:24px;">

        <!-- Profile -->
        <div>
          <div
            style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:14px;">
            Profile</div>
          <div style="margin-bottom:12px;">
            <label
              style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.04em;">Username</label>
            <div style="display:flex;gap:8px;align-items:center;">
              <input id="acct-username" type="text"
                style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;font-family:var(--font);padding:10px 12px;outline:none;transition:border-color 0.15s;" />
              <button onclick="saveUsername()"
                style="background:var(--accent);border:none;color:#0f0d0c;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;white-space:nowrap;">Save</button>
            </div>
          </div>
          <div>
            <label
              style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.04em;">Email</label>
            <div style="display:flex;gap:8px;align-items:center;">
              <input id="acct-email" type="email" placeholder="you@example.com"
                style="flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;font-family:var(--font);padding:10px 12px;outline:none;transition:border-color 0.15s;" />
              <button onclick="saveEmail()"
                style="background:var(--accent);border:none;color:#0f0d0c;border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;font-family:var(--font);cursor:pointer;white-space:nowrap;">Save</button>
            </div>
          </div>
        </div>

        <!-- Security -->
        <div>
          <div
            style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-muted);margin-bottom:14px;">
            Security</div>
          <label
            style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.04em;">Current
            password</label>
          <input id="acct-current-pw" type="password" placeholder="••••••••"
            style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;font-family:var(--font);padding:10px 12px;outline:none;margin-bottom:10px;transition:border-color 0.15s;" />
          <label
            style="font-size:12px;color:var(--text-muted);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:0.04em;">New
            password</label>
          <input id="acct-new-pw" type="password" placeholder="at least 6 characters"
            style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;font-family:var(--font);padding:10px 12px;outline:none;margin-bottom:12px;transition:border-color 0.15s;" />
          <button onclick="savePassword()"
            style="width:100%;background:var(--accent);border:none;color:#0f0d0c;border-radius:20px;padding:11px;font-size:14px;font-weight:600;font-family:var(--font);cursor:pointer;transition:opacity 0.2s;">Change
            password</button>
        </div>

        <!-- Feedback -->
        <div id="acct-msg" style="font-size:13px;text-align:center;min-height:16px;"></div>
      </div>
    </div>
  </div>

  <header>
    <div class="header-left">
      <canvas id="orb"></canvas>
      <span class="header-name">Anjo</span>
      <div class="status-dot" id="status-dot"></div>
    </div>
    <div style="position:relative;">
      <button class="menu-btn" id="menu-btn" onclick="toggleMenu()" title="Menu">···</button>
      <div class="dropdown" id="dropdown">
        <a href="/story" class="dropdown-item">Our story</a>
        <a href="mailto:support@your-domain.com?subject=Feedback" class="dropdown-item">Send feedback</a>
        <div style="border-top:1px solid var(--border);margin:4px 0;"></div>
        <div style="border-top:1px solid var(--border);margin:4px 0;"></div>
        <button class="dropdown-item" onclick="openAccountModal()">My account</button>
        <button class="dropdown-item danger" onclick="openModal('forget')">Forget me</button>
        <button class="dropdown-item danger" onclick="openModal('delete')">Delete account</button>
        <a href="/logout" class="dropdown-item danger">Sign out</a>
      </div>
    </div>
  </header>

  <div class="thread" id="thread"></div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="Say something…" rows="1"></textarea>
      <button class="send-btn" id="send-btn" onclick="send()">
        <svg viewBox="0 0 24 24">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
      </button>
    </div>
  </div>

  <script>
    let sessionId = null;
    let isStreaming = false;

    // ── End session on tab close ─────────────────────────────────────────────
    // Use visibilitychange for reliable detection; fallback to pagehide
    async function _endSessionQuietly() {
      if (!sessionId) return;
      const sid = sessionId;
      sessionId = null;  // prevent re-entry
      try {
        await fetch(`/api/chat/${sid}/end`, {
          method: 'POST',
          keepalive: true,
          credentials: 'same-origin'
        });
      } catch (_) { }
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') _endSessionQuietly();
    });
    window.addEventListener('pagehide', _endSessionQuietly);

    // ── Orb — fluid presence ──────────────────────────────────────────────────
    const ORB_PX = 38;

    // Organic noise from sine combinations
    function _n2(x, y) {
      return (
        Math.sin(x * 1.73 + y * 0.97) * 0.50 +
        Math.sin(x * 0.51 + y * 2.07) * 0.30 +
        Math.sin(x * 3.13 - y * 1.41) * 0.20
      );
    }

    class Orb {
      constructor(canvas) {
        this.canvas = canvas;
        const dpr = window.devicePixelRatio || 1;
        canvas.width = ORB_PX * dpr;
        canvas.height = ORB_PX * dpr;
        canvas.style.width = ORB_PX + 'px';
        canvas.style.height = ORB_PX + 'px';
        this.ctx = canvas.getContext('2d');
        this.ctx.scale(dpr, dpr);
        this.t = Math.random() * 100;
        this.trust = 0;
        this.arousal = 0;
        this.valence = 0;
        this.longing = 0;
        this.awaiting = false;
        this.blobs = [
          { phase: 0.0, rx: 0.62, ry: 0.55, size: 0.82 },
          { phase: 2.4, rx: 0.58, ry: 0.62, size: 0.78 },
          { phase: 4.8, rx: 0.50, ry: 0.58, size: 0.74 },
          { phase: 1.2, rx: 0.54, ry: 0.48, size: 0.68 },
        ];
        this._raf = null;
        this._fill();
      }

      _fill() {
        const { ctx } = this;
        const r = ORB_PX / 2;
        ctx.beginPath();
        ctx.arc(r, r, r, 0, Math.PI * 2);
        ctx.fillStyle = '#100e0c';
        ctx.fill();
      }

      setState(s) {
        if (s.trust !== undefined) this.trust = s.trust;
        if (s.arousal !== undefined) this.arousal = s.arousal;
        if (s.valence !== undefined) this.valence = s.valence;
        if (s.longing !== undefined) this.longing = s.longing;
        if (s.awaiting !== undefined) this.awaiting = s.awaiting;
      }

      start() {
        const tick = () => { this._draw(); this._raf = requestAnimationFrame(tick); };
        tick();
      }

      stop() { if (this._raf) { cancelAnimationFrame(this._raf); this._raf = null; } }

      _draw() {
        const { ctx } = this;
        const sz = ORB_PX, cx = sz / 2, cy = sz / 2, r = sz / 2;

        // Speed: base + arousal contribution. Awaiting = slower, more breath-like
        const spd = this.awaiting
          ? 0.0025 + Math.max(0, this.arousal) * 0.002
          : 0.004 + Math.max(0, this.arousal) * 0.005;
        this.t += spd;
        const t = this.t;

        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, r - 0.5, 0, Math.PI * 2);
        ctx.clip();

        // Fade trail
        ctx.globalCompositeOperation = 'source-over';
        const fade = 0.10 + Math.max(0, this.arousal) * 0.07;
        ctx.fillStyle = `rgba(13,13,15,${fade})`;
        ctx.fillRect(0, 0, sz, sz);

        // Each blob draws from a different emotional palette
        const cols = [
          _sampleRgb(T_TRUST, this.trust),                        // blob 0: trust
          _sampleRgb(V_COLORS, (this.valence + 1) / 2),           // blob 1: valence (-1..+1 → 0..1)
          _sampleRgb(A_COLORS, (this.arousal + 1) / 2),           // blob 2: arousal (-1..+1 → 0..1)
          _sampleRgb(L_COLORS, this.longing),                      // blob 3: longing
        ];

        // Mobile-style: solid overlapping blobs with higher opacity (no white gap)
        const BLOB_OPACITIES = [0.55, 0.50, 0.46, 0.42];

        for (let i = 0; i < this.blobs.length; i++) {
          const b = this.blobs[i];
          const nx = _n2(t * b.rx + b.phase, t * 0.31 + b.phase * 0.4);
          const ny = _n2(t * b.ry + b.phase + 1.7, t * 0.27 + b.phase * 0.6);

          // Longing: blobs drift inward — she's reaching
          const pull = this.longing * 0.30;
          const spread = r * 0.28 * (1 - pull * 0.3);
          const bx = cx + nx * spread;
          const by = cy + ny * spread;

          const blobR = r * b.size * (this.awaiting ? 1.12 : 1.0);
          const [rc, gc, bc] = cols[i];
          const alpha = BLOB_OPACITIES[i];

          // Solid filled gradient like mobile - no transparency at center, fills the gap
          const grad = ctx.createRadialGradient(bx, by, 0, bx, by, blobR);
          grad.addColorStop(0, `rgba(${rc},${gc},${bc},${alpha})`);
          grad.addColorStop(0.55, `rgba(${rc},${gc},${bc},${(alpha * 0.8).toFixed(3)})`);
          grad.addColorStop(1, `rgba(${rc},${gc},${bc},${(alpha * 0.3).toFixed(3)})`);

          ctx.beginPath();
          ctx.arc(bx, by, blobR, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
        }

        // Subtle rim — trust-colored glow at edge
        ctx.globalCompositeOperation = 'source-over';
        const rim = ctx.createRadialGradient(cx, cy, r * 0.65, cx, cy, r);
        const rimC = _sampleRgb(T_TRUST, this.trust);
        rim.addColorStop(0, 'rgba(0,0,0,0)');
        rim.addColorStop(1, `rgba(${rimC[0]},${rimC[1]},${rimC[2]},0.10)`);
        ctx.fillStyle = rim;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      // Draw a single static frame to a different canvas — used for message avatars
      snapshot(targetCanvas) {
        const dpr = window.devicePixelRatio || 1;
        const sz = 28;
        targetCanvas.width = sz * dpr;
        targetCanvas.height = sz * dpr;
        targetCanvas.style.width = sz + 'px';
        targetCanvas.style.height = sz + 'px';
        const ctx = targetCanvas.getContext('2d');
        ctx.scale(dpr, dpr);
        const cx = sz / 2, cy = sz / 2, r = sz / 2;

        ctx.save();
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = '#100e0c';
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy, r - 0.5, 0, Math.PI * 2);
        ctx.clip();

        const cols = [
          _sampleRgb(T_TRUST, this.trust),
          _sampleRgb(V_COLORS, (this.valence + 1) / 2),
          _sampleRgb(A_COLORS, (this.arousal + 1) / 2),
          _sampleRgb(L_COLORS, this.longing),
        ];

        // Mobile-style: solid blobs for avatars (no white gap)
        const BLOB_OPACITIES = [0.55, 0.50, 0.46, 0.42];
        const tp = this.t;
        for (let i = 0; i < this.blobs.length; i++) {
          const b = this.blobs[i];
          const nx = _n2(tp * b.rx + b.phase, tp * 0.31 + b.phase * 0.4);
          const ny = _n2(tp * b.ry + b.phase + 1.7, tp * 0.27 + b.phase * 0.6);
          const pull = this.longing * 0.30;
          const spread = r * 0.28 * (1 - pull * 0.3);
          const bx = cx + nx * spread;
          const by = cy + ny * spread;
          const blobR = r * b.size;
          const [rc, gc, bc] = cols[i];
          const alpha = BLOB_OPACITIES[i];
          const grad = ctx.createRadialGradient(bx, by, 0, bx, by, blobR);
          grad.addColorStop(0, `rgba(${rc},${gc},${bc},${alpha})`);
          grad.addColorStop(0.55, `rgba(${rc},${gc},${bc},${(alpha * 0.8).toFixed(3)})`);
          grad.addColorStop(1, `rgba(${rc},${gc},${bc},${(alpha * 0.3).toFixed(3)})`);
          ctx.beginPath();
          ctx.arc(bx, by, blobR, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();
        }

        ctx.globalCompositeOperation = 'source-over';
        const rimC = _sampleRgb(T_TRUST, this.trust);
        const rim = ctx.createRadialGradient(cx, cy, r * 0.65, cx, cy, r);
        rim.addColorStop(0, 'rgba(0,0,0,0)');
        rim.addColorStop(1, `rgba(${rimC[0]},${rimC[1]},${rimC[2]},0.18)`);
        ctx.fillStyle = rim;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    let _orb = null;
    function initOrb() {
      const canvas = document.getElementById('orb');
      if (!canvas) return;
      _orb = new Orb(canvas);
      _orb.start();
    }

    // ── Emotion color system — each blob driven by a different dimension ──────
    // Blob 0: Trust (relationship depth)    blue → teal → coral
    const T_TRUST = ['#4A6FA5', '#2EC4B6', '#E86F5C'];
    // Blob 1: Valence (mood: sad ↔ happy)   purple → teal → gold
    const V_COLORS = ['#7B6B9E', '#5AC8BE', '#F7D26A'];
    // Blob 2: Arousal (energy: calm ↔ excited)  navy → green → pink
    const A_COLORS = ['#2C3E6B', '#45B7A0', '#FF6F91'];
    // Blob 3: Longing (attachment)  deep purple → magenta → rose
    const L_COLORS = ['#3D1A5C', '#C060C0', '#FFB0E8'];
    // Background temperature
    const T_BG = ['#0a0c12', '#0b0e0e', '#0f0d0b'];

    function _hexRgb(hex) {
      const n = parseInt(hex.slice(1), 16);
      return [(n >> 16) & 0xff, (n >> 8) & 0xff, n & 0xff];
    }

    function _lerpNum(a, b, t) { return a + (b - a) * t; }

    function _lerp(a, b, t) {
      const [ar, ag, ab] = _hexRgb(a), [br, bg, bb] = _hexRgb(b);
      const r = Math.round(ar + (br - ar) * t).toString(16).padStart(2, '0');
      const g = Math.round(ag + (bg - ag) * t).toString(16).padStart(2, '0');
      const v = Math.round(ab + (bb - ab) * t).toString(16).padStart(2, '0');
      return `#${r}${g}${v}`;
    }

    function _sample(stops, val) {
      const t = Math.max(0, Math.min(1, val)) * (stops.length - 1);
      const i = Math.min(Math.floor(t), stops.length - 2);
      return _lerp(stops[i], stops[i + 1], t - i);
    }

    // Returns [r, g, b] ints — used directly by the orb blobs
    function _sampleRgb(stops, val) {
      const t = Math.max(0, Math.min(1, val)) * (stops.length - 1);
      const i = Math.min(Math.floor(t), stops.length - 2);
      const f = t - i;
      const [ar, ag, ab] = _hexRgb(stops[i]), [br, bg, bb] = _hexRgb(stops[i + 1]);
      return [Math.round(_lerpNum(ar, br, f)), Math.round(_lerpNum(ag, bg, f)), Math.round(_lerpNum(ab, bb, f))];
    }

    function applyTemperature(trust) {
      const accent = _sample(T_TRUST, trust);
      // Derive accent2 as a lighter tint of accent
      const [ar, ag, ab] = _hexRgb(accent);
      const accent2 = `#${[ar, ag, ab].map(c => Math.min(255, c + 40).toString(16).padStart(2, '0')).join('')}`;
      const bg = _sample(T_BG, trust);
      const root = document.documentElement;
      root.style.setProperty('--accent', accent);
      root.style.setProperty('--accent2', accent2);
      root.style.setProperty('--bg', bg);
      const btn = document.getElementById('send-btn');
      if (btn) btn.style.boxShadow = `0 2px 12px rgba(${ar},${ag},${ab},0.28)`;
      _orb?.setState({ trust });
    }

    async function fetchStage() {
      try {
        const r = await fetch('/api/story/memories');
        if (!r.ok) return;
        const d = await r.json();
        applyTemperature(d?.relationship?.trust_score ?? 0);
      } catch (_) { }
    }

    // ── Close dropdown on outside click ──────────────────────────────────────
    document.addEventListener('click', e => {

    // ── Status ────────────────────────────────────────────────────────────────
    function setStatus(s) {
      const d = document.getElementById('status-dot');
      d.className = 'status-dot' + (s === 'loading' ? ' loading' : s === 'offline' ? ' offline' : '');
    }

    // ── Thread helpers ────────────────────────────────────────────────────────
    function scrollDown() {
      const t = document.getElementById('thread');
      t.scrollTop = t.scrollHeight;
    }

    function _fmtTime(d) {
      return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    }

    function addUserBubble(text, ts) {
      const thread = document.getElementById('thread');
      const row = document.createElement('div');
      row.className = 'msg-row user';
      const time = ts ? `<div class="msg-time">${_fmtTime(new Date(ts))}</div>` : '';
      row.innerHTML = `<div class="msg-wrap"><div class="bubble">${escHtml(text)}</div>${time}</div>`;
      thread.appendChild(row);
      scrollDown();
    }

    function addAnjoBubble() {
      const thread = document.getElementById('thread');
      const row = document.createElement('div');
      row.className = 'msg-row anjo';
      row.innerHTML = `
      <canvas class="msg-avatar-canvas"></canvas>
      <div class="msg-wrap">
        <div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>
      </div>`;
      thread.appendChild(row);
      scrollDown();
      return row;
    }

    function appendToAnjoBubble(row, chunk) {
      const bubble = row.querySelector('.bubble');
      const typing = bubble.querySelector('.typing');
      if (typing) typing.remove();
      bubble.textContent = (bubble.textContent || '') + chunk;
      scrollDown();
    }

    function stampAnjoBubble(row) {
      const wrap = row.querySelector('.msg-wrap');
      if (wrap && !wrap.querySelector('.msg-time')) {
        const t = document.createElement('div');
        t.className = 'msg-time';
        t.textContent = _fmtTime(new Date());
        wrap.appendChild(t);
      }
      const avatarCanvas = row.querySelector('.msg-avatar-canvas');
      if (avatarCanvas && _orb) _orb.snapshot(avatarCanvas);
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Session ───────────────────────────────────────────────────────────────
    async function startSession() {
      try {
        const tzOffset = -new Date().getTimezoneOffset();
        const r = await fetch(`/api/chat/start?tz_offset=${tzOffset}`, { method: 'POST' });
        const d = await r.json();
        sessionId = d.session_id;
        if (d.pending_outreach) {
          // Orb enters awaiting state — different motion before the message arrives
          _orb?.setState({ awaiting: true });
          await new Promise(res => setTimeout(res, 1800));
          _orb?.setState({ awaiting: false });
          const row = addAnjoBubble();
          const bubble = row.querySelector('.bubble');
          bubble.querySelector('.typing')?.remove();
          bubble.textContent = d.pending_outreach;
          stampAnjoBubble(row);
          scrollDown();
        }
      } catch (e) {
        setStatus('offline');
      }
    }

    async function loadHistory() {
      try {
        const r = await fetch('/api/chat/history');
        if (!r.ok) return;
        const d = await r.json();
        const thread = document.getElementById('thread');
        thread.innerHTML = '';
        for (const msg of (d.history ?? [])) {
          if (msg.role === 'user') {
            addUserBubble(msg.content);
          } else if (msg.role === 'assistant') {
            const row = addAnjoBubble();
            const bubble = row.querySelector('.bubble');
            bubble.querySelector('.typing')?.remove();
            bubble.textContent = msg.content;
            const avatarCanvas = row.querySelector('.msg-avatar-canvas');
            if (avatarCanvas && _orb) _orb.snapshot(avatarCanvas);
          }
        }
        scrollDown();
        setStatus('online');
      } catch (e) {
        setStatus('offline');
      }
    }

    async function newConversation() {
      document.getElementById('dropdown').classList.remove('open');
      if (!sessionId) return;
      try {
        await fetch(`/api/chat/${sessionId}/end`, { method: 'POST' });
      } catch (_) { }
      document.getElementById('thread').innerHTML = '';
      await startSession();
    }

    // ── Send ──────────────────────────────────────────────────────────────────
    // Client-side rate tracking — mirrors server limit of 30/min
    const _sendLog = [];
    function _clientRateLimited() {
      const now = Date.now();
      while (_sendLog.length && now - _sendLog[0] > 60000) _sendLog.shift();
      if (_sendLog.length >= 28) return true;
      _sendLog.push(now);
      return false;
    }

    async function send() {
      if (isStreaming || !sessionId) return;
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;

      if (_clientRateLimited()) {
        const row = addAnjoBubble();
        const bubble = row.querySelector('.bubble');
        bubble.querySelector('.typing')?.remove();
        bubble.textContent = '— slow down a little —';
        bubble.style.color = 'var(--text-muted)';
        bubble.style.fontStyle = 'italic';
        scrollDown();
        return;
      }

      input.value = '';
      input.style.height = 'auto';
      addUserBubble(text, Date.now());

      isStreaming = true;
      document.getElementById('send-btn').disabled = true;
      input.disabled = true;
      setStatus('loading');

      const anjoBubble = addAnjoBubble();

      try {
        const resp = await fetch(`/api/chat/${sessionId}/message`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!resp.ok || !resp.body) { setStatus('offline'); finish(); return; }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let currentEvent = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();
          for (const line of lines) {
            if (line.startsWith('event: ')) {
              currentEvent = line.slice(7).trim();
            } else if (line.startsWith('data: ')) {
              let d;
              try { d = JSON.parse(line.slice(6)); } catch { continue; }
              if (currentEvent === 'token') {
                appendToAnjoBubble(anjoBubble, d.text);
              } else if (currentEvent === 'done') {
                if (d.silent) {
                  anjoBubble.remove();
                } else {
                  stampAnjoBubble(anjoBubble);
                }
                if (d.mood && _orb) {
                  _orb.setState({
                    arousal: d.mood.arousal,
                    valence: d.mood.valence,
                    longing: d.attachment?.longing ?? _orb.longing,
                  });
                }
                setStatus('online');
                finish();
              } else if (currentEvent === 'error') {
                const bubble = anjoBubble.querySelector('.bubble');
                bubble.querySelector('.typing')?.remove();
                bubble.textContent = '— something went wrong, try again —';
                bubble.style.color = 'var(--text-muted)';
                bubble.style.fontStyle = 'italic';
                setStatus('offline');
                finish();
              }
              currentEvent = '';
            }
          }
        }

      } catch (e) {
        setStatus('offline');
        finish();
      }
    }

    function finish() {
      isStreaming = false;
      document.getElementById('send-btn').disabled = false;
      const input = document.getElementById('input');
      input.disabled = false;
      input.focus();
    }

    // ── Textarea auto-grow ────────────────────────────────────────────────────
    document.getElementById('input').addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 140) + 'px';
    });

    document.getElementById('input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

      document.getElementById('dropdown').classList.remove('open');

      });

        if (!r.ok) return;
        const d = await r.json();
        const sel = document.getElementById('ceiling-select');
        if (sel) sel.value = d.relationship_ceiling || 'none';

    function showToast(msg, type = 'info') {
      const t = document.createElement('div');
      t.textContent = msg;
      t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
        background:${type === 'error' ? 'var(--red)' : 'var(--surface2)'};color:var(--text);
        padding:12px 20px;border-radius:10px;border:1px solid var(--border);font-size:14px;

    // ── Account modal ─────────────────────────────────────────────────────────
    async function openAccountModal() {
      document.getElementById('dropdown').classList.remove('open');
      document.getElementById('acct-msg').textContent = '';
      document.getElementById('acct-current-pw').value = '';
      document.getElementById('acct-new-pw').value = '';
      const modal = document.getElementById('account-modal');
      modal.style.display = 'flex';
      try {
        const r = await fetch('/api/account');
        if (r.ok) {
          const d = await r.json();
          document.getElementById('acct-username').value = d.username || '';
          document.getElementById('acct-email').value = d.email || '';
        }
      } catch (_) { }
    }

    function closeAccountModal() {
      document.getElementById('account-modal').style.display = 'none';
    }

    function _acctMsg(text, ok) {
      const el = document.getElementById('acct-msg');
      el.textContent = text;
      el.style.color = ok ? 'var(--accent)' : 'var(--red)';
    }

    async function saveUsername() {
      const newUsername = document.getElementById('acct-username').value.trim();
      const password = await _promptAccountPassword();
      if (!password) return;
      try {
        const r = await fetch('/api/account/update-username', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: newUsername, password }),
        });
        const d = await r.json();
        if (r.ok) _acctMsg('Username updated.', true);
        else _acctMsg(d.detail || 'Failed to update username.', false);
      } catch (_) { _acctMsg('Something went wrong.', false); }
    }

    async function saveEmail() {
      const newEmail = document.getElementById('acct-email').value.trim();
      const password = await _promptAccountPassword();
      if (!password) return;
      try {
        const r = await fetch('/api/account/update-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: newEmail, password }),
        });
        const d = await r.json();
        if (r.ok) _acctMsg('Email updated.', true);
        else _acctMsg(d.detail || 'Failed to update email.', false);
      } catch (_) { _acctMsg('Something went wrong.', false); }
    }

    async function savePassword() {
      const current = document.getElementById('acct-current-pw').value;
      const next = document.getElementById('acct-new-pw').value;
      if (!current || !next) { _acctMsg('Enter both passwords.', false); return; }
      try {
        const r = await fetch('/api/account/change-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ current_password: current, new_password: next }),
        });
        const d = await r.json();
        if (r.ok) {
          _acctMsg('Password changed.', true);
          document.getElementById('acct-current-pw').value = '';
          document.getElementById('acct-new-pw').value = '';
        } else {
          _acctMsg(d.detail || 'Failed to change password.', false);
        }
      } catch (_) { _acctMsg('Something went wrong.', false); }
    }

    // Inline password prompt for username/email changes — reuses existing modal
    function _promptAccountPassword() {
      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.style.cssText = 'position:fixed;inset:0;z-index:20000;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;';
        overlay.innerHTML = `
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:min(320px,90vw);">
            <p style="font-size:14px;margin-bottom:14px;">Confirm your password</p>
            <input id="_acct_pw_prompt" type="password" placeholder="••••••••"
              style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;font-family:var(--font);padding:10px 12px;outline:none;margin-bottom:12px;" />
            <div style="display:flex;gap:8px;">
              <button id="_acct_pw_cancel" style="flex:1;background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:10px;padding:9px;cursor:pointer;font-size:13px;">Cancel</button>
              <button id="_acct_pw_ok" style="flex:1;background:var(--accent);border:none;color:#0f0d0c;border-radius:10px;padding:9px;cursor:pointer;font-size:13px;font-weight:600;">Confirm</button>
            </div>
          </div>`;
        document.body.appendChild(overlay);
        const input = overlay.querySelector('#_acct_pw_prompt');
        input.focus();
        overlay.querySelector('#_acct_pw_cancel').onclick = () => { overlay.remove(); resolve(null); };
        overlay.querySelector('#_acct_pw_ok').onclick = () => { const v = input.value; overlay.remove(); resolve(v || null); };
        input.onkeydown = (e) => { if (e.key === 'Enter') { const v = input.value; overlay.remove(); resolve(v || null); } };
      });
    }

    // Close account modal on outside click
    document.getElementById('account-modal').addEventListener('click', function (e) {
      if (e.target === this) closeAccountModal();
    });

    // ── Password modal ────────────────────────────────────────────────────────
    let _modalAction = null;

    function openModal(action) {
      document.getElementById('dropdown').classList.remove('open');
      _modalAction = action;
      const isDelete = action === 'delete';
      document.getElementById('pwd-modal-title').textContent = isDelete
        ? 'Delete account'
        : 'Forget me';
      document.getElementById('pwd-modal-desc').textContent = isDelete
        ? 'This permanently deletes your account and all data. Enter your password to confirm.'
        : 'Anjo will decide what to release. Your chat history will be erased. Enter your password to confirm.';
      document.getElementById('pwd-modal-error').textContent = '';
      document.getElementById('pwd-modal-input').value = '';
      const modal = document.getElementById('pwd-modal');
      modal.style.display = 'flex';
      setTimeout(() => document.getElementById('pwd-modal-input').focus(), 50);

      document.getElementById('pwd-modal-confirm').onclick = confirmModal;
      document.getElementById('pwd-modal-input').onkeydown = e => {
        if (e.key === 'Enter') confirmModal();
        if (e.key === 'Escape') closeModal();
      };
    }

    function closeModal() {
      document.getElementById('pwd-modal').style.display = 'none';
      _modalAction = null;
    }

    async function confirmModal() {
      const password = document.getElementById('pwd-modal-input').value;
      if (!password) return;
      const errEl = document.getElementById('pwd-modal-error');
      errEl.textContent = '';

      if (_modalAction === 'forget') {
        await requestForget(password);
      } else if (_modalAction === 'delete') {
        await deleteAccount(password);
      }
    }

    async function requestForget(password) {
      closeModal();
      const row = addAnjoBubble();
      const bubble = row.querySelector('.bubble');
      try {
        const r = await fetch('/api/forget', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (r.status === 403) {
          bubble.querySelector('.typing')?.remove();
          bubble.textContent = 'Incorrect password.';
          bubble.style.color = 'var(--text-muted)';
          scrollDown();
          return;
        }
        const d = await r.json();
        bubble.querySelector('.typing')?.remove();
        bubble.textContent = d.response;
        scrollDown();
        setTimeout(async () => {
          document.getElementById('thread').innerHTML = '';
          sessionId = null;
          await startSession();
        }, 3200);
      } catch (e) {
        bubble.querySelector('.typing')?.remove();
        bubble.textContent = 'Something went wrong. Please try again.';
        scrollDown();
      }
    }

    async function deleteAccount(password) {
      try {
        const r = await fetch('/api/account/delete', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password }),
        });
        if (r.status === 403) {
          document.getElementById('pwd-modal-error').textContent = 'Incorrect password.';
          document.getElementById('pwd-modal').style.display = 'flex';
          return;
        }
        // Account gone — go to landing
        window.location.href = '/';
      } catch (e) {
        document.getElementById('pwd-modal-error').textContent = 'Something went wrong. Try again.';
        document.getElementById('pwd-modal').style.display = 'flex';
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    (async () => {
      initOrb();
      fetchStage();
      fetchCeiling();
      await startSession();
      await loadHistory();
      document.getElementById('input').focus();
    })();
