name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[test,dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Run tests
        run: pytest
        env:
          # Tests use conftest.py fixtures — no real keys needed
          ANTHROPIC_API_KEY: test-key
          ANJO_SECRET: test-secret-minimum-32-chars-long-ok
          ANJO_ADMIN_SECRET: test-admin-secret
          ANJO_ENV: dev
